<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Tobacco Atlas · 离线</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --panel: #ffffff;
        --panel2: #ffffff;
        --accent: #2f7a3d;
        --text: #1a1a1a;
        --muted: rgba(26, 26, 26, 0.62);
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI",
          sans-serif;
      }
      .wrap {
        max-width: 420px;
        margin: 0 auto;
        padding: 28px 18px;
      }
      .card {
        background: var(--panel);
        border: 1px solid rgba(26, 26, 26, 0.12);
        border-radius: 22px;
        padding: 18px;
        box-shadow: 0 14px 30px rgba(17, 24, 39, 0.1);
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(47, 122, 61, 0.12);
        border: 1px solid rgba(47, 122, 61, 0.25);
        color: rgba(26, 26, 26, 0.9);
      }
      h1 {
        font-size: 18px;
        margin: 10px 0 6px;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }
      button {
        margin-top: 14px;
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 12px 14px;
        background: rgba(47, 122, 61, 0.92);
        color: white;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 0 0 1px rgba(47, 122, 61, 0.22), 0 14px 40px rgba(17, 24, 39, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <span class="badge">OFFLINE · 离线</span>
        <h1>网络不可用</h1>
        <p>你可以继续浏览已缓存的页面；当网络恢复后，点击下方按钮刷新。</p>
        <button onclick="location.reload()">重新加载 / Reload</button>
      </div>
    </div>
  </body>
</html>
